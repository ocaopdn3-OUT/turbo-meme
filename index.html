<title>ระบบรายงานไฟฟ้าขัดข้อง — ศูนย์ลพบุรี PEA N3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1520;--bg2:#111d2e;--bg3:#0f1e30;
  --border:#1e3d70;--border2:#1a3260;
  --blue:#3a80e0;--blue2:#5da8ff;--blue3:#7ab8ff;
  --green:#40e080;--red:#ff5555;--yellow:#ffd050;
  --text:#e0e8f4;--muted:#5a7ca5;
}
body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh}
input,select,textarea{
  background:var(--bg3);border:1.5px solid var(--border);color:var(--text);
  border-radius:7px;padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:14px;
  width:100%;outline:none;transition:border-color .2s
}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
select option{background:var(--bg3)}
textarea{resize:vertical}
.lbl{font-size:11.5px;font-weight:700;color:var(--blue2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:12px}
.sec-title{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border2);padding-bottom:6px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:13px}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#1a5fb4,#3a80e0);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-sm{border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;font-family:'Sarabun',sans-serif;font-weight:600;border:1px solid}
.badge{border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700}
.bar-wrap{background:#0c1520;border-radius:4px;height:26px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;transition:width .8s}
.toast{position:fixed;top:18px;right:18px;z-index:9999;padding:11px 20px;border-radius:9px;font-size:14px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tab-btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;transition:all .2s}
.tab-active{background:linear-gradient(135deg,#1a5fb4,#3a80e0);color:#fff;box-shadow:0 3px 10px rgba(58,128,224,.35)}
.tab-inactive{background:var(--bg2);color:var(--muted);border:1.5px solid var(--border2)}
.readonly-field{background:#071828!important;color:#40e080!important;border-color:#1a6030!important;cursor:default}
.cause-btn{flex:1;padding:11px;border-radius:9px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;border:2px solid;transition:all .2s;text-align:center;background:var(--bg3)}
.event-type-btn{flex:1;padding:14px 18px;border-radius:10px;cursor:pointer;border:2px solid var(--border);background:var(--bg2);transition:all .2s}
.event-type-btn.active-major{border-color:#ff5555;background:#2a0808}
.event-type-btn.active-minor{border-color:#ffd050;background:#2a2000}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{border-radius:5px;background:var(--bg2);border:1px solid var(--border2);padding:5px 0;text-align:center;min-height:28px}
.cal-day.has-ev{background:#0a1e3a;border-color:var(--blue)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1e3a6a;border-radius:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.modal-box{background:#fff;border-radius:8px;width:100%;max-width:880px;max-height:88vh;overflow-y:auto;margin:auto}
</style>

// JSONP fetch helper (ไม่มีปัญหา CORS)
// ══════════════════════════════════════════
function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timeout);
    }
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName + '&t=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('JSONP error')); };
    document.head.appendChild(script);
  });
}

async function fetchReports(){
  try{
    const data = await fetchJSONP(SCRIPT_URL);
    if(Array.isArray(data)){saveLocal(data);return data}
  }catch(e){console.warn("Sheet fetch failed, using local cache",e)}
  return loadLocal();
}
// POST via hidden iframe form — ไม่มี CORS
function postViaForm(url, jsonBody) {
  return new Promise((resolve) => {
    // สร้าง hidden iframe เพื่อรับ response (ไม่ redirect หน้าหลัก)
    const iframe = document.createElement('iframe');
    iframe.name = 'hidden_post_' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.target = iframe.name;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = jsonBody;
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();

    // cleanup หลัง 3 วินาที
    setTimeout(() => {
      if(form.parentNode) form.parentNode.removeChild(form);
      if(iframe.parentNode) iframe.parentNode.removeChild(iframe);
      resolve(true);
    }, 3000);
  });
}

async function saveToSheet(report){
  try{
    const subCode = (report.substation||'').split(' — ')[0].trim() || report.substation || '';
    const reportWithSubName = {...report, subName: SUB_NAMES[subCode] || subCode};
    const payload = JSON.stringify({action:"save", report:reportWithSubName});
    // ใช้ hidden form POST — ไม่มี CORS เลย
    await postViaForm(SCRIPT_URL, payload);
  }
  catch(e){console.warn("Sheet save failed",e)}
}
async function deleteFromSheet(id){
  try{
    const payload = JSON.stringify({action:"delete", id});
    await postViaForm(SCRIPT_URL, payload);
  }
  catch(e){console.warn("Sheet delete failed",e)}
}

// B115: fetch จาก Apps Script via JSONP → fallback เป็น SUBSTATION_DB (hardcode)
async function loadB115(){
  try{
    const data = await fetchJSONP(SCRIPT_URL + "?type=b115");
    if(data && typeof data === "object" && Object.keys(data).length > 5){
      console.log("B115 loaded from Sheet:", Object.keys(data).length, "stations");
      const db = {};
      Object.entries(data).forEach(([sub, items]) => {
        const label = SUB_NAMES[sub] || sub;
        const key = sub + " — " + label;
        const breakers = {};
        items.forEach(b => { breakers[b.code] = {line:b.line||"", affected:b.affected||""}; });
        db[key] = {label, breakers};
      });
      return db;
    }
    throw new Error("invalid data");
  } catch(e){
    console.warn("B115 fetch failed, using hardcoded data:", e.message);
    return SUBSTATION_DB;
  }
}

async function loadDist(){
  if(distCache)return distCache;
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1536583184`;
    const res=await fetch(url);
    const csv=await res.text();
    distCache=csv.trim().split("\n").slice(1).map(r=>{
      const c=r.split(",");
      return{bus:c[0]?.trim(),sub:c[1]?.trim(),dist:c[2]?.trim(),
        v3ph:parseFloat(c[3])||0,v2ph:parseFloat(c[4])||0,
        v2phg:parseFloat(c[5])||0,v1phg:parseFloat(c[6])||0};
    }).filter(r=>r.bus&&r.sub);
    return distCache;
  }catch(e){console.warn("DIST load failed",e);return[]}
}
function getBusNum(sub,breaker){
  const m=breaker.match(/(\d{2})/);const n=m?parseInt(m[1]):1;
  if(sub==="NSA")return(n>=1&&n<=6)?"BUS1":"BUS2";
  if(["LOA","TKB","TCA"].includes(sub))return(n>=1&&n<=4)?"BUS1":"BUS2";
  return n<=5?"BUS1":"BUS2";
}

function calcDist(sub,breaker,phase,ia,ib,ic,ig){
  const maxI=Math.max(parseFloat(ia)||0,parseFloat(ib)||0,parseFloat(ic)||0,parseFloat(ig)||0);
  if(maxI===0)return"-";

  // ดึง sub code ถ้ามี " — " นำหน้า
  const subCode = sub ? sub.split(" — ")[0].trim() : "";
  const bus=getBusNum(subCode,breaker);

  // phase → column
  const col=["ABC","ABCG"].includes(phase)?"v3ph"
    :["AB","BC","AC"].includes(phase)?"v2ph"
    :["ABG","BCG","ACG"].includes(phase)?"v2phg"
    :"v1phg";

  // filter: bus + sub
  const filtered=DIST_TABLE.filter(r=>r.bus===bus&&r.sub===subCode);
  if(!filtered.length)return"ไม่พบข้อมูล";

  // filter: ค่า col <= maxI
  const candidates=filtered.filter(r=>r[col]<=maxI);
  if(!candidates.length){
    // ระยะทางไกลสุด (กระแสน้อยกว่าทุกแถว = อยู่ไกลมาก)
    const sorted=[...filtered].sort((a,b)=>{
      const da=a.dist==="< 1"?-1:a.dist==="> 40"?99:parseFloat(a.dist)||0;
      const db=b.dist==="< 1"?-1:b.dist==="> 40"?99:parseFloat(b.dist)||0;
      return da-db;
    });
    return sorted[sorted.length-1].dist;
  }
  // sort DESC by col แล้วเอาแรก = ระยะทางที่ใกล้ที่สุดที่กระแส <= maxI
  const sorted=[...candidates].sort((a,b)=>b[col]-a[col]);
  return sorted[0].dist;
}

function setState(partial,rerender=true){
  Object.assign(state,typeof partial==="function"?partial(state):partial);
  if(rerender)render();
}
function setForm(partial){
  const f=typeof partial==="function"?partial(state.form):{...state.form,...partial};
  setState({form:f});
}

let toastTimer=null;
function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg;
  t.className="toast";
  const colors={success:"#0a2e1a|#5fffb0|#1a6a3a",error:"#3d0f0f|#ff6b6b|#7a1c1c",info:"#0d1e3d|#7ab8ff|#1d4a8a"};
  const[bg,col,border]=(colors[type]||colors.info).split("|");
  t.style.cssText=`background:${bg};color:${col};border:1px solid ${border};display:block`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.display="none"},2800);
}

// ══════════════════════════════════════════
// FORM HANDLERS
// ══════════════════════════════════════════
async function handleSave(){
  const f=state.form;
  if(!f.substation||!f.breakerCode){showToast("กรุณาเลือกสถานีและรหัสเบรกเกอร์","error");return}
  if(!f.causeText?.trim()){showToast("กรุณากรอก สาเหตุเบื้องต้น","error");return}
  if(f.causeSolved===null||f.causeSolved===undefined){showToast("กรุณาเลือก ผลการตรวจสอบสาเหตุ","error");return}
  if(f.eventType==="major"){
    if(!f.action?.trim()){showToast("กรุณากรอก การดำเนินการ","error");return}
    if(!f.note?.trim()){showToast("กรุณากรอก หมายเหตุ","error");return}
  }
  const entry={...f,id:f.id||Date.now(),createdAt:f.createdAt||new Date().toISOString()};
  const updated=f.id?state.reports.map(r=>r.id===f.id?entry:r):[...state.reports,entry];
  setState({reports:updated,form:newBlankForm(),editingId:null,view:"stats"});
  saveLocal(updated);
  showToast("กำลังบันทึก...","info");
  await saveToSheet(entry);
  showToast("บันทึกเรียบร้อย ✓");
}
function handleEdit(r){setState({form:{...r},editingId:r.id,view:"form"})}
async function handleDelete(id){
  if(!confirm("ยืนยันการลบรายงานนี้?"))return;
  const updated=state.reports.filter(r=>r.id!==id);
  setState({reports:updated});saveLocal(updated);
  showToast("กำลังลบ...","info");
  await deleteFromSheet(id);showToast("ลบแล้ว","info");
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(!app)return;

  // เก็บ focus state ก่อน render
  const active = document.activeElement;
  const activeId = active ? active.id : null;
  const activeTag = active ? active.tagName : null;
  const selStart = (active && active.selectionStart !== undefined) ? active.selectionStart : null;
  const selEnd   = (active && active.selectionEnd   !== undefined) ? active.selectionEnd   : null;

  app.innerHTML=buildApp();
  attachEvents();

  // คืน focus หลัง render
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

let distCalcTimer=null;
function triggerDistCalc(force=false){
  if(distCalcTimer)clearTimeout(distCalcTimer);
  distCalcTimer=setTimeout(()=>{
    const f=state.form;
    const sub=f.substation?f.substation.split(" — ")[0]:f.substation||"";
    if(!sub||!f.breakerCode)return;
    const dist=calcDist(sub,f.breakerCode,f.phase,f.ia,f.ib,f.ic,f.ig);
    setForm({calcDistance:dist,zone:dist==="-"?"-":`${dist} กม.`});
  },force?0:400);
}

function buildCalendar(reports){
  const now=new Date();
  const year=state.calYear, month=state.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const isCurrentMonth=(year===now.getFullYear()&&month===now.getMonth());

  const eventMap={};
  reports.forEach(r=>{
    let d;
    if(r.date&&typeof r.date==="object"){d=new Date(r.date.year-543,r.date.month-1,r.date.day)}
    else{d=new Date(r.createdAt)}
    if(!isNaN(d)&&d.getFullYear()===year&&d.getMonth()===month){
      const day=d.getDate();
      if(!eventMap[day])eventMap[day]=[];
      eventMap[day].push({b:r.breakerCode,t:r.tripType});
    }
  });

  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const dayNames=["อา","จ","อ","พ","พฤ","ศ","ส"];

  // Header + nav buttons
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <button onclick="calNav(-1)" style="background:#1a3a6a;border:1px solid var(--blue);color:var(--blue3);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:Sarabun">‹</button>
    <div style="font-weight:700;color:var(--blue);font-size:13px">${TH_MONTHS_SHORT[month]} ${year+543}</div>
    <button onclick="calNav(1)" style="background:#1a3a6a;border:1px solid var(--blue);color:var(--blue3);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:Sarabun">›</button>
  </div>`;

  html+=`<div class="cal-grid" style="margin-bottom:4px">${dayNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding:3px 0;font-weight:700">${d}</div>`).join("")}</div>`;
  weeks.forEach(week=>{
    html+=`<div class="cal-grid" style="margin-bottom:3px">`;
    week.forEach((d,i)=>{
      if(!d&&i>=week.length){html+=`<div></div>`;return}
      const evs=d&&eventMap[d];
      const isToday=isCurrentMonth&&d===now.getDate();
      html+=`<div class="cal-day${evs?" has-ev":""}" style="font-size:11px;color:${isToday?"#ffd050":"#90b8e8"}${evs?";cursor:pointer":""}">`;
      if(d)html+=d;
      if(evs)html+=`<div style="width:5px;height:5px;border-radius:50%;background:var(--blue);margin:2px auto"></div>`;
      if(evs)html+=`<div style="font-size:8px;color:var(--blue2);line-height:1.2">${evs.map(e=>e.b).join("<br>")}</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  html+=`<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center">🔵 มีเหตุการณ์ | 🟡 วันนี้</div>`;
  return html;
}

// EXPORT EXCEL
// ══════════════════════════════════════════
window.exportExcel = function() {
  const {filterBreaker, filterEventType, filterDateFrom, filterDateTo, reports} = state;

  const fromTS = filterDateFrom ? new Date(filterDateFrom.year-543, filterDateFrom.month-1, filterDateFrom.day).getTime() : null;
  const toTS   = filterDateTo   ? new Date(filterDateTo.year-543,   filterDateTo.month-1,   filterDateTo.day, 23, 59).getTime() : null;

  const filtered = reports.filter(r => {
    if(filterBreaker && !r.breakerCode?.toLowerCase().includes(filterBreaker.toLowerCase())) return false;
    if(filterEventType && r.eventType !== filterEventType) return false;
    const ts = r.date && typeof r.date==="object"
      ? new Date(r.date.year-543, r.date.month-1, r.date.day).getTime() : 0;
    if(fromTS && ts && ts < fromTS) return false;
    if(toTS   && ts && ts > toTS)   return false;
    return true;
  });

  if(!filtered.length){ showToast("ไม่มีข้อมูลสำหรับ export","error"); return; }

  // สร้าง CSV (UTF-8 BOM สำหรับ Excel ภาษาไทย)
  const headers = ["วันที่","เวลา","สถานีไฟฟ้า","รหัสอุปกรณ์","ประเภท","การทำงาน","Relay","เฟส","IFA","IFB","IFC","IFG","ระยะทาง(กม.)","อากาศ","โหลด(MW)","ผลตรวจสอบ","สาเหตุ","ประเภทสาเหตุ","การดำเนินการ","หมายเหตุ"];

  const escape = v => {
    const s = String(v||"").replace(/"/g,'""');
    return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s}"` : s;
  };

  const rows = filtered.map(r => [
    r.date ? `${r.date.day}/${r.date.month}/${r.date.year}` : "",
    r.time||"",
    SUB_NAMES[(r.substation||"").split(" — ")[0].trim()] || r.substation || "",
    r.breakerCode||"",
    r.eventType==="minor"?"Minor Event":"Major Event",
    r.tripType||"",
    r.relay||"",
    r.phase||"",
    r.ia||"", r.ib||"", r.ic||"", r.ig||"",
    r.zone||"",
    r.weather||"",
    r.load||"",
    r.causeSolved===true?"พบสาเหตุ":r.causeSolved===false?"ไม่พบสาเหตุ":"",
    r.causeText||"",
    r.causeCategory||"",
    r.action||"",
    r.note||"",
  ]);

  const csv = "\uFEFF" + [headers, ...rows].map(row => row.map(escape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  // ชื่อไฟล์ตาม filter
  const dateTag = filterDateFrom ? `${filterDateFrom.day}-${filterDateFrom.month}-${filterDateFrom.year}` : "all";
  a.download = `fault_report_${dateTag}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  showToast(`Export ${filtered.length} รายการเรียบร้อย ✓`);
};

window.updateDate=function(target,field,val){
  if(target==="form"){
    const d={...state.form.date};
    if(field==="day")d.day=parseInt(val);
    else if(field==="month")d.month=parseInt(val);
    else if(field==="year")d.year=parseInt(val);
    setForm({date:d});
  } else if(target==="filter"){
    const cur=state.filterDateFrom||{day:1,month:1,year:new Date().getFullYear()+543};
    const d={...cur};
    if(field==="fday")d.day=parseInt(val);
    else if(field==="fmonth")d.month=parseInt(val);
    else if(field==="fyear")d.year=parseInt(val);
    if(d.day&&d.month&&d.year)setState({filterDateFrom:d});
  } else if(target==="filterTo"){
    const cur=state.filterDateTo||{day:31,month:12,year:new Date().getFullYear()+543};
    const d={...cur};
    if(field==="tday")d.day=parseInt(val);
    else if(field==="tmonth")d.month=parseInt(val);
    else if(field==="tyear")d.year=parseInt(val);
    if(d.day&&d.month&&d.year)setState({filterDateTo:d});
  }
};

// FORM REPORT (แบบฟอร์มรายงาน)

window.exportFormReport = function(id) {
  const r = state.reports.find(x => x.id === id);
  if (!r) return;

  const dateStr  = formatThaiDate(r.date);
  // ดึงชื่อสถานีไฟฟ้าจาก SUB_NAMES map
  const _subCode = (r.substation||'').split(' — ')[0].trim() || r.substation || '';
  const subName  = SUB_NAMES[_subCode] || (r.substation||'–').replace(/^[A-Z0-9_/]+ — /,'').trim() || '–';
  const bkCode   = r.breakerCode || '–';
  const relay    = r.relay || '–';
  const phase    = r.phase || '–';
  const zone     = r.zone  || '–';
  const weather  = r.weather || '–';
  const load     = r.load  || '–';
  const trip     = r.tripType || '–';
  const affected = r.affected || '–';
  const isMinor  = r.eventType === 'minor' ||
    (r.tripType === 'T/R2' || r.tripType === 'T/L');

  // ── การทำงาน: แสดงในช่อง + สี ──
  // Major: Trip Reclose → T/R (เหลือง), Trip Lockout → T/L (แดง)
  // Minor: T/R1, T/R2 → แสดงตามจริง (เหลือง), T/L → T/L (แดง)
  const isTR = trip==='T/R1' || trip==='T/R2';
  const isTL = trip.includes('T/L');

  // ── tripShort: สิ่งที่แสดงในช่องการทำงาน ──
  // Minor: แสดงตามจริง T/R1, T/R2, T/L
  // Major: T/R1 → T/R1 | T/L(...) → T/L
  let tripShort;
  if(isMinor){
    tripShort = trip; // T/R1, T/R2, T/L แสดงตามจริง
  } else {
    // Major
    if(isTR) tripShort = 'T/R1';          // T/R1 แสดง T/R1
    else if(isTL) tripShort = 'T/L';       // T/L (...) ย่อเป็น T/L
    else tripShort = trip;
  }
  const tripColor = isTR ? '#f5e000' : isTL ? '#e74c3c' : '#f5e000';
  const tripTextColor = isTR ? '#000' : isTL ? '#fff' : '#000';

  // ปีจากวันที่ที่กรอก (พ.ศ.)
  const yr = (r.date && r.date.year) ? r.date.year
    : (r.createdAt ? new Date(r.createdAt).getFullYear()+543 : new Date().getFullYear()+543);
  // นับสถิติเฉพาะปี yr และ breaker เดียวกัน
  // นับสถิติ: breaker เดียวกัน + ปีเดียวกัน
  const same = state.reports.filter(x => {
    if(!x.breakerCode || x.breakerCode !== r.breakerCode) return false;
    const xy = (x.date && x.date.year) ? Number(x.date.year)
      : (x.createdAt ? new Date(x.createdAt).getFullYear()+543 : 0);
    return xy === Number(yr);
  });
  // Major: Trip Reclose → T/R, Trip Lockout (ทั้ง 2 แบบ) → T/L
  // Minor: T/R1, T/R2 → T/R, T/L → T/L
  // T/R1, T/R2 → นับเป็น T/R | T/L (...) → นับเป็น T/L
  const trCount = same.filter(x => {
    const t = x.tripType||'';
    return t==='T/R1' || t==='T/R2';
  }).length;
  const tlCount = same.filter(x => {
    const t = x.tripType||'';
    return t==='T/L' || t.includes('T/L');
  }).length;

  const ia = r.ia && parseFloat(r.ia) ? r.ia+' A' : '–';
  const ib = r.ib && parseFloat(r.ib) ? r.ib+' A' : '–';

    '<div class="FTR">แผนกควบคุมระบบไฟฟ้า กฟน.3 · พิมพ์เมื่อ '+new Date().toLocaleString('th-TH')+'</div>' +
    '</div>';

  const mc = document.getElementById('form-modal-content');
  mc.innerHTML = content;
  document.getElementById('form-modal').style.display = 'flex';
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener("DOMContentLoaded",async()=>{
  render();
  setState({syncing:true},false);
  // Load reports and B22 in parallel
  // โหลด B115 และ B22 พร้อมกัน (live จาก Sheet)
  setState({minorDB:B22_DB, minorDBLoaded:true, majorDB:SUBSTATION_DB},false);
  const [data, liveB22, liveB115] = await Promise.all([
    fetchReports(),
    loadB22(),
    loadB115(),
  ]);
  setState({
    reports: data,
    syncing: false,
    minorDB: liveB22,
    minorDBLoaded: true,
    majorDB: liveB115,
  });
});
</script>
</body>
</html>
