const WEATHER_OPTIONS = ["ปกติ","ชื้น","ลมแรง","ฝนตก ลมแรง","ฝนตก ฟ้าคะนอง"];

// ══════════════════════════════════════════
// JSONP fetch helper (ไม่มีปัญหา CORS)
// ══════════════════════════════════════════
function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timeout);
    }
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName + '&t=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('JSONP error')); };
    document.head.appendChild(script);
  });
}

// ══════════════════════════════════════════
// GOOGLE SHEETS SYNC
// ══════════════════════════════════════════
async function fetchReports(){
  try{
    const data = await fetchJSONP(SCRIPT_URL);
    if(Array.isArray(data)){saveLocal(data);return data}
  }catch(e){console.warn("Sheet fetch failed, using local cache",e)}
  return loadLocal();
}
// POST via hidden iframe form — ไม่มี CORS
function postViaForm(url, jsonBody) {
  return new Promise((resolve) => {
    // สร้าง hidden iframe เพื่อรับ response (ไม่ redirect หน้าหลัก)
    const iframe = document.createElement('iframe');
    iframe.name = 'hidden_post_' + Date.now();
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = url;
    form.target = iframe.name;
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = jsonBody;
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();

    // cleanup หลัง 3 วินาที
    setTimeout(() => {
      if(form.parentNode) form.parentNode.removeChild(form);
      if(iframe.parentNode) iframe.parentNode.removeChild(iframe);
      resolve(true);
    }, 3000);
  });
}

async function saveToSheet(report){
  try{
    const subCode = (report.substation||'').split(' — ')[0].trim() || report.substation || '';
    const reportWithSubName = {...report, subName: getSubName(subCode) || subCode};
    const payload = JSON.stringify({action:"save", report:reportWithSubName});
    // ใช้ hidden form POST — ไม่มี CORS เลย
    await postViaForm(SCRIPT_URL, payload);
  }
  catch(e){console.warn("Sheet save failed",e)}
}
async function deleteFromSheet(id){
  try{
    const payload = JSON.stringify({action:"delete", id});
    await postViaForm(SCRIPT_URL, payload);
  }
  catch(e){console.warn("Sheet delete failed",e)}
}

// ══════════════════════════════════════════
// DIST TABLE (ระยะทาง)
// ══════════════════════════════════════════
let distCache=null;
const B22_DB = {};
// cache variables
let subNamesCache = null;
let distLiveCache = null;
// SUB NAMES: fetch จาก Apps Script via JSONP → fallback เป็น SUB_NAMES (hardcode)
async function loadSubNames(){
  try{
    const data = await fetchJSONP(SCRIPT_URL + "?type=subnames");
    if(data && typeof data === "object" && Object.keys(data).length > 10){
      console.log("SUB_NAMES loaded from Sheet:", Object.keys(data).length, "entries");
      return data;
    }
    throw new Error("invalid data");
  } catch(e){
    console.warn("SUB_NAMES fetch failed, using hardcoded:", e.message);
    return SUB_NAMES;
  }
}

// B115: fetch จาก Apps Script via JSONP → fallback เป็น SUBSTATION_DB (hardcode)
async function loadB115(){
  try{
    const data = await fetchJSONP(SCRIPT_URL + "?type=b115");
    if(data && typeof data === "object" && Object.keys(data).length > 5){
      console.log("B115 loaded from Sheet:", Object.keys(data).length, "stations");
      const db = {};
      Object.entries(data).forEach(([sub, items]) => {
        const label = SUB_NAMES[sub] || sub;
        const breakers = {};
        items.forEach(b => { breakers[b.code] = {line:b.line||"", affected:b.affected||""}; });
        db[sub] = {label, breakers};
      });
      return db;
    }
    throw new Error("invalid data");
  } catch(e){
    console.warn("B115 fetch failed, using hardcoded data:", e.message);
    return SUBSTATION_DB;
  }
}

// B22: fetch จาก Apps Script via JSONP → fallback เป็น B22_DB (hardcode)
async function loadB22(){
  try{
    const data = await fetchJSONP(SCRIPT_URL + "?type=b22");
    if(data && typeof data === "object" && Object.keys(data).length > 5){
      console.log("B22 loaded from Sheet:", Object.keys(data).length, "stations");
      return data;
    }
    throw new Error("invalid data");
  } catch(e){
    console.warn("B22 fetch failed, using hardcoded data:", e.message);
    return B22_DB;
  }
}
async function loadDist(){
  if(distCache)return distCache;
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=1536583184`;
    const res=await fetch(url);
    const csv=await res.text();
    distCache=csv.trim().split("\n").slice(1).map(r=>{
      const c=r.split(",");
      return{bus:c[0]?.trim(),sub:c[1]?.trim(),dist:c[2]?.trim(),
        v3ph:parseFloat(c[3])||0,v2ph:parseFloat(c[4])||0,
        v2phg:parseFloat(c[5])||0,v1phg:parseFloat(c[6])||0};
    }).filter(r=>r.bus&&r.sub);
    return distCache;
  }catch(e){console.warn("DIST load failed",e);return[]}
}

// loadDistLive: fetch DIST จาก Apps Script via JSONP → fallback เป็น DIST_TABLE (hardcode)
async function loadDistLive(){
  try{
    const data = await fetchJSONP(SCRIPT_URL + "?type=dist");
    if(Array.isArray(data) && data.length > 100){
      console.log("DIST loaded from Sheet:", data.length, "rows");
      distLiveCache = data;
      return data;
    }
    throw new Error("invalid data");
  }catch(e){
    console.warn("DIST live fetch failed, using hardcoded DIST_TABLE:", e.message);
    distLiveCache = DIST_TABLE;
    return DIST_TABLE;
  }
}
function getBusNum(sub,breaker){
  const m=breaker.match(/(\d{2})/);const n=m?parseInt(m[1]):1;
  if(sub==="NSA")return(n>=1&&n<=6)?"BUS1":"BUS2";
  if(["LOA","TKB","TCA"].includes(sub))return(n>=1&&n<=4)?"BUS1":"BUS2";
  return n<=5?"BUS1":"BUS2";
}

function calcDist(sub,breaker,phase,ia,ib,ic,ig){
  const maxI=Math.max(parseFloat(ia)||0,parseFloat(ib)||0,parseFloat(ic)||0,parseFloat(ig)||0);
  if(maxI===0)return"-";

  // ดึง sub code ถ้ามี " — " นำหน้า
  const subCode = sub ? sub.split(" — ")[0].trim() : "";
  const bus=getBusNum(subCode,breaker);

  // phase → column
  const col=["ABC","ABCG"].includes(phase)?"v3ph"
    :["AB","BC","AC"].includes(phase)?"v2ph"
    :["ABG","BCG","ACG"].includes(phase)?"v2phg"
    :"v1phg";

  // filter: bus + sub (ใช้ live cache ถ้ามี ไม่งั้น fallback hardcode)
  const distSource = (distLiveCache && distLiveCache.length > 0) ? distLiveCache : DIST_TABLE;
  const filtered=distSource.filter(r=>r.bus===bus&&r.sub===subCode);
  if(!filtered.length)return"ไม่พบข้อมูล";

  // filter: ค่า col <= maxI
  const candidates=filtered.filter(r=>r[col]<=maxI);
  if(!candidates.length){
    // ระยะทางไกลสุด (กระแสน้อยกว่าทุกแถว = อยู่ไกลมาก)
    const sorted=[...filtered].sort((a,b)=>{
      const da=a.dist==="< 1"?-1:a.dist==="> 40"?99:parseFloat(a.dist)||0;
      const db=b.dist==="< 1"?-1:b.dist==="> 40"?99:parseFloat(b.dist)||0;
      return da-db;
    });
    return sorted[sorted.length-1].dist;
  }
  // sort DESC by col แล้วเอาแรก = ระยะทางที่ใกล้ที่สุดที่กระแส <= maxI
  const sorted=[...candidates].sort((a,b)=>b[col]-a[col]);
  return sorted[0].dist;
}


// ══════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════
function setState(partial,rerender=true){
  Object.assign(state,typeof partial==="function"?partial(state):partial);
  if(rerender)render();
}
function setForm(partial){
  const f=typeof partial==="function"?partial(state.form):{...state.form,...partial};
  setState({form:f});
}

let toastTimer=null;

function showBreakerModal(code) {
  const current = state.filterBreaker;
  // toggle: คลิกซ้ำ = ล้าง filter
  const next = (current === code) ? '' : code;
  setState({filterBreaker: next});
  if (next) {
    setTimeout(() => {
      const el = document.getElementById('report-section');
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 80);
  }
}

function showToast(msg,type="success"){
  const t=document.getElementById("toast");
  if(!t)return;
  t.textContent=msg;
  t.className="toast";
  const colors={success:"#0a2e1a|#5fffb0|#1a6a3a",error:"#3d0f0f|#ff6b6b|#7a1c1c",info:"#0d1e3d|#7ab8ff|#1d4a8a"};
  const[bg,col,border]=(colors[type]||colors.info).split("|");
  t.style.cssText=`background:${bg};color:${col};border:1px solid ${border};display:block`;
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.display="none"},2800);
}

// ══════════════════════════════════════════
// FORM HANDLERS
// ══════════════════════════════════════════
async function handleSave(){
  const f=state.form;
  if(!f.substation||!f.breakerCode){showToast("กรุณาเลือกสถานีและรหัสเบรกเกอร์","error");return}
  if(!f.causeText?.trim()){showToast("กรุณากรอก สาเหตุเบื้องต้น","error");return}
  if(f.causeSolved===null||f.causeSolved===undefined){showToast("กรุณาเลือก ผลการตรวจสอบสาเหตุ","error");return}
  if(f.eventType==="major"){
    if(!f.action?.trim()){showToast("กรุณากรอก การดำเนินการ","error");return}
    if(!f.note?.trim()){showToast("กรุณากรอก หมายเหตุ","error");return}
  }
  const entry={...f,id:f.id||Date.now(),createdAt:f.createdAt||new Date().toISOString()};
  const updated=f.id?state.reports.map(r=>r.id===f.id?entry:r):[...state.reports,entry];
  setState({reports:updated,form:newBlankForm(),editingId:null,view:"stats"});
  saveLocal(updated);
  showToast("กำลังบันทึก...","info");
  await saveToSheet(entry);
  showToast("บันทึกเรียบร้อย ✓");
}
function handleEdit(r){
  let form={...r};
  if(!form.affected) form.affected=getAffected(r);
  setState({form,editingId:r.id,view:"form"});
}
async function handleDelete(id){
  if(!confirm("ยืนยันการลบรายงานนี้?"))return;
  const updated=state.reports.filter(r=>r.id!==id);
  setState({reports:updated});saveLocal(updated);
  showToast("กำลังลบ...","info");
  await deleteFromSheet(id);showToast("ลบแล้ว","info");
}

// ══════════════════════════════════════════
// HTML BUILDER HELPERS
// ══════════════════════════════════════════
function el(tag,attrs="",children=""){return`<${tag} ${attrs}>${children}</${tag}>`}
function div(cls,children,style=""){return`<div class="${cls}" style="${style}">${children}</div>`}
function opt(val,label,sel){return`<option value="${val}"${sel===val?` selected`:""} >${label}</option>`}

function buildSelect(id,options,value,onchange,disabled=false){
  const opts=options.map(([v,l])=>opt(v,l,value)).join("");
  return`<select id="${id}" onchange="${onchange}" ${disabled?"disabled":""}>${opts}</select>`;
}
function buildInput(id,value,placeholder,onchange,type="text"){
  return`<input id="${id}" type="${type}" value="${(value||"").replace(/"/g,"&quot;")}" placeholder="${placeholder}" oninput="${onchange}">`;
}
function buildTextarea(id,value,placeholder,rows=3){
  return`<textarea id="${id}" rows="${rows}" placeholder="${placeholder}" oninput="setForm({${id.replace(/-/g,"_")}:this.value})">${(value||"").replace(/</g,"&lt;")}</textarea>`;
}

// ══════════════════════════════════════════
// MAIN RENDER
// ══════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  if(!app)return;

  // เก็บ focus state ก่อน render
  const active = document.activeElement;
  const activeId = active ? active.id : null;
  const activeTag = active ? active.tagName : null;
  const selStart = (active && active.selectionStart !== undefined) ? active.selectionStart : null;
  const selEnd   = (active && active.selectionEnd   !== undefined) ? active.selectionEnd   : null;

  app.innerHTML=buildApp();
  attachEvents();

  // คืน focus หลัง render
  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

let distCalcTimer=null;
function triggerDistCalc(force=false){
  if(distCalcTimer)clearTimeout(distCalcTimer);
  distCalcTimer=setTimeout(async()=>{
    const f=state.form;
    const sub=f.substation?f.substation.split(" — ")[0]:f.substation||"";
    if(!sub||!f.breakerCode)return;
    // โหลด live dist ถ้ายังไม่มี
    if(!distLiveCache) await loadDistLive();
    const dist=calcDist(sub,f.breakerCode,f.phase,f.ia,f.ib,f.ic,f.ig);
    setForm({calcDistance:dist,zone:dist==="-"?"-":`${dist} กม.`});
  },force?0:400);
}

function buildRestorePicker(field,value){
  const isDash=!value||value==="-";
  const h=isDash?"00":(value||"00:00").split(":")[0];
  const m=isDash?"00":(value||"00:00").split(":")[1];
  const hours=Array.from({length:24},(_,i)=>String(i).padStart(2,"0"));
  const mins=Array.from({length:60},(_,i)=>String(i).padStart(2,"0"));
  return`
<div style="display:flex;gap:6px;align-items:center">
  <button onclick="setForm({${field}:${isDash?"'00:00'":"\"'-'\"".replace(/'/g,"'")}})" style="width:36px;height:36px;border-radius:7px;background:${isDash?"#1a3a6a":"var(--bg3)"};border:1.5px solid ${isDash?"var(--blue)":"var(--border)"};color:${isDash?"var(--blue3)":"var(--muted)"};font-weight:700;font-size:16px;cursor:pointer"
    onclick="toggleRestore('${field}',${isDash})">${isDash?"+":"−"}</button>
  ${isDash?`<div style="flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--muted);font-size:14px;text-align:center">–</div>`:`
  <select onchange="updateRestoreH('${field}','${m}',this.value)">${hours.map(hh=>`<option value="${hh}"${hh===h?" selected":""}>${hh}</option>`).join("")}</select>
  <span style="color:var(--blue3);font-weight:700">:</span>
  <select onchange="updateRestoreM('${field}','${h}',this.value)">${mins.map(mm=>`<option value="${mm}"${mm===m?" selected":""}>${mm}</option>`).join("")}</select>
  <span style="color:var(--muted);font-size:13px">น.</span>`}
</div>`;
}

function buildStatsView(){
  const{filterBreaker,filterDateFrom,filterDateTo,reports}=state;
  const fromTS=filterDateFrom?new Date(filterDateFrom.year-543,filterDateFrom.month-1,filterDateFrom.day).getTime():null;
  const toTS=filterDateTo?new Date(filterDateTo.year-543,filterDateTo.month-1,filterDateTo.day,23,59).getTime():null;
  const toEventTS=r=>{
    if(r.date&&typeof r.date==="object")return new Date(r.date.year-543,r.date.month-1,r.date.day).getTime();
    const d=new Date(r.createdAt);return isNaN(d)?0:d.getTime();
  };
  const filterEventType=state.filterEventType;
  const filtered=reports.filter(r=>{
    if(filterBreaker&&!r.breakerCode?.toLowerCase().includes(filterBreaker.toLowerCase()))return false;
    if(filterEventType&&r.eventType!==filterEventType)return false;
    const ts=toEventTS(r);
    if(fromTS&&ts&&ts<fromTS)return false;
    if(toTS&&ts&&ts>toTS)return false;
    return true;
  });

  const bkStats={};filtered.forEach(r=>{if(r.breakerCode)bkStats[r.breakerCode]=(bkStats[r.breakerCode]||0)+1});
  const causeStats={};filtered.forEach(r=>{if(r.causeCategory)causeStats[r.causeCategory]=(causeStats[r.causeCategory]||0)+1});
  const maxB=Math.max(1,...Object.values(bkStats));
  const maxC=Math.max(1,...Object.values(causeStats));

  const filterBar=`
<div class="card" style="margin-bottom:14px">
  <div class="sec-title" style="margin-bottom:12px">🔍 กรองข้อมูล</div>
  <div class="grid2" style="margin-bottom:10px">
    <div>
      <div class="lbl">รหัสเบรกเกอร์</div>
      <input id="inp-filter-breaker" type="text" value="${filterBreaker}" placeholder="พิมพ์รหัส เช่น MR-7062" oninput="setState({filterBreaker:this.value})">
    </div>
    <div>
      <div class="lbl">ประเภทเหตุการณ์</div>
      <select onchange="setState({filterEventType:this.value})">
        <option value=""${!state.filterEventType?' selected':''}>ทั้งหมด</option>
        <option value="major"${state.filterEventType==='major'?' selected':''}>⚡ Major Event</option>
        <option value="minor"${state.filterEventType==='minor'?' selected':''}>🔌 Minor Event</option>
      </select>
    </div>
  </div>
  <div class="grid2">
    <div>
      <div class="lbl">ตั้งแต่วันที่</div>
      <div id="filter-date-from"></div>

function buildCalendar(reports){
  const now=new Date();
  const year=state.calYear, month=state.calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const isCurrentMonth=(year===now.getFullYear()&&month===now.getMonth());

  const eventMap={};
  reports.forEach(r=>{
    let d;
    if(r.date&&typeof r.date==="object"){d=new Date(r.date.year-543,r.date.month-1,r.date.day)}
    else{d=new Date(r.createdAt)}
    if(!isNaN(d)&&d.getFullYear()===year&&d.getMonth()===month){
      const day=d.getDate();
      if(!eventMap[day])eventMap[day]=[];
      eventMap[day].push({b:r.breakerCode,t:r.tripType});
    }
  });

  const cells=[...Array(firstDay).fill(null),...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const dayNames=["อา","จ","อ","พ","พฤ","ศ","ส"];

  // Header + nav buttons
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <button onclick="calNav(-1)" style="background:#1a3a6a;border:1px solid var(--blue);color:var(--blue3);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:Sarabun">‹</button>
    <div style="font-weight:700;color:var(--blue);font-size:13px">${TH_MONTHS_SHORT[month]} ${year+543}</div>
    <button onclick="calNav(1)" style="background:#1a3a6a;border:1px solid var(--blue);color:var(--blue3);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:Sarabun">›</button>
  </div>`;

  html+=`<div class="cal-grid" style="margin-bottom:4px">${dayNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding:3px 0;font-weight:700">${d}</div>`).join("")}</div>`;
  weeks.forEach(week=>{
    html+=`<div class="cal-grid" style="margin-bottom:3px">`;
    week.forEach((d,i)=>{
      if(!d&&i>=week.length){html+=`<div></div>`;return}
      const evs=d&&eventMap[d];
      const isToday=isCurrentMonth&&d===now.getDate();
      const selDate=state.calSelectedDay;
      const isSelected=selDate&&selDate.d===d&&selDate.m===month&&selDate.y===year;
      const bg=isSelected?";background:rgba(93,168,255,0.25);border-radius:5px":"";
      html+=`<div class="cal-day${evs?" has-ev":""}" style="font-size:11px;color:${isToday?"#ffd050":"#90b8e8"}${evs?";cursor:pointer":""}${bg}" ${evs?`onclick="calSelectDay(${d},${month},${year})"`:""}>`;
      if(d)html+=d;
      if(evs)html+=`<div style="width:5px;height:5px;border-radius:50%;background:var(--blue);margin:2px auto"></div>`;
      if(evs)html+=`<div style="font-size:8px;color:var(--blue2);line-height:1.2">${evs.map(e=>e.b).join("<br>")}</div>`;
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  html+=`<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center">🔵 มีเหตุการณ์ | 🟡 วันนี้</div>`;
  return html;
}

function buildInlineDatePicker(targetId,value,onChange){

// EXPORT EXCEL
// ══════════════════════════════════════════
window.exportExcel = function() {
  const {filterBreaker, filterEventType, filterDateFrom, filterDateTo, reports} = state;

  const fromTS = filterDateFrom ? new Date(filterDateFrom.year-543, filterDateFrom.month-1, filterDateFrom.day).getTime() : null;
  const toTS   = filterDateTo   ? new Date(filterDateTo.year-543,   filterDateTo.month-1,   filterDateTo.day, 23, 59).getTime() : null;

  const filtered = reports.filter(r => {
    if(filterBreaker && !r.breakerCode?.toLowerCase().includes(filterBreaker.toLowerCase())) return false;
    if(filterEventType && r.eventType !== filterEventType) return false;
    const ts = r.date && typeof r.date==="object"
      ? new Date(r.date.year-543, r.date.month-1, r.date.day).getTime() : 0;
    if(fromTS && ts && ts < fromTS) return false;
    if(toTS   && ts && ts > toTS)   return false;
    return true;
  });

  if(!filtered.length){ showToast("ไม่มีข้อมูลสำหรับ export","error"); return; }

  // สร้าง CSV (UTF-8 BOM สำหรับ Excel ภาษาไทย)
  const headers = ["วันที่","เวลา","สถานีไฟฟ้า","รหัสอุปกรณ์","ประเภท","การทำงาน","Relay","เฟส","IFA","IFB","IFC","IFG","ระยะทาง(กม.)","อากาศ","โหลด(MW)","ผลตรวจสอบ","สาเหตุ","ประเภทสาเหตุ","การดำเนินการ","หมายเหตุ"];

  const escape = v => {
    const s = String(v||"").replace(/"/g,'""');
    return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s}"` : s;
  };

  const rows = filtered.map(r => [
    r.date ? `${r.date.day}/${r.date.month}/${r.date.year}` : "",
    r.time||"",
    SUB_NAMES[(r.substation||"").split(" — ")[0].trim()] || r.substation || "",
    r.breakerCode||"",
    r.eventType==="minor"?"Minor Event":"Major Event",
    r.tripType||"",
    r.relay||"",
    r.phase||"",
    r.ia||"", r.ib||"", r.ic||"", r.ig||"",
    r.zone||"",
    r.weather||"",
    r.load||"",
    r.causeSolved===true?"พบสาเหตุ":r.causeSolved===false?"ไม่พบสาเหตุ":"",
    r.causeText||"",
    r.causeCategory||"",
    r.action||"",
    r.note||"",
  ]);

  const csv = "\uFEFF" + [headers, ...rows].map(row => row.map(escape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  // ชื่อไฟล์ตาม filter
  const dateTag = filterDateFrom ? `${filterDateFrom.day}-${filterDateFrom.month}-${filterDateFrom.year}` : "all";
  a.download = `fault_report_${dateTag}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  showToast(`Export ${filtered.length} รายการเรียบร้อย ✓`);
};

window.calNav=function(dir){
  let y=state.calYear, m=state.calMonth+dir;
  if(m>11){m=0;y++;}
  else if(m<0){m=11;y--;}
  setState({calYear:y,calMonth:m,calSelectedDay:null,filterDateFrom:null,filterDateTo:null});
};

window.calSelectDay=function(d,m,y){

  if(sel&&sel.d===d&&sel.m===m&&sel.y===y){

window.updateDate=function(target,field,val){
  if(target==="form"){
    const d={...state.form.date};
    if(field==="day")d.day=parseInt(val);
    else if(field==="month")d.month=parseInt(val);
    else if(field==="year")d.year=parseInt(val);
    setForm({date:d});
  } else if(target==="filter"){
    const cur=state.filterDateFrom||{day:1,month:1,year:new Date().getFullYear()+543};
    const d={...cur};
    if(field==="fday")d.day=parseInt(val);
    else if(field==="fmonth")d.month=parseInt(val);
    else if(field==="fyear")d.year=parseInt(val);
    if(d.day&&d.month&&d.year)setState({filterDateFrom:d});
  } else if(target==="filterTo"){
    const cur=state.filterDateTo||{day:31,month:12,year:new Date().getFullYear()+543};
    const d={...cur};
    if(field==="tday")d.day=parseInt(val);
    else if(field==="tmonth")d.month=parseInt(val);
    else if(field==="tyear")d.year=parseInt(val);

// helper: ดึง entry จาก majorDB รับได้ทั้ง "BQA" และ "BQA — บ้านไร่"
function getMajorEntry(sub){
  if(!sub||!state.majorDB) return null;
  const code=sub.includes(" — ")?sub.split(" — ")[0].trim():sub;
  return state.majorDB[code]||null;
}

// helper: ดึง affected จาก majorDB/minorDB ถ้า r.affected ว่าง
// minorDB key = "BQA" (code สั้น จาก Sheet col A)
// majorDB key = "BQA — บ้านไร่" (แปลงใน loadB115) value = {label, breakers:{code:{affected,line}}}
function getAffected(r){
  if(r.affected) return r.affected;
  const sub=r.substation||"", code=r.breakerCode||"";
  // subCode = ส่วนก่อน — เช่น "BQA"
  const subCode=sub.includes(" — ")?sub.split(" — ")[0].trim():sub;
  if(r.eventType==="minor"){
    // minorDB: key="BQA", value=[{code,affected},...]
    const db=state.minorDB[subCode]||state.minorDB[sub]||[];
    const fd=db.find(x=>x.code===code);
    return fd?fd.affected||"":"";
  } else {
    // majorDB: key="BQA — บ้านไร่", value={label,breakers:{code:{affected,line}}}
    // หาจาก key ที่ขึ้นต้นด้วย subCode+" — "
    const entry=getMajorEntry(sub);
    return entry?.breakers?.[code]?.affected||"";
  }
}
